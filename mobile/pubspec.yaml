name: lingoflux
description: LingoFlux - Learn languages in your context
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  flutter_local_notifications: ^17.0.0
  google_mlkit_text_recognition: ^0.10.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
